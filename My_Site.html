<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <title>Links Website</title>
    <style>
      :root {
        --primary-glow: rgba(255, 255, 255, 0.4);
        --card-bg: rgba(255, 255, 255, 0.45);
        --card-border: rgba(255, 255, 255, 0.6);
        --text-color: #2c3e50;
      }

      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        /* Bright, energetic background: Cyan, Sky Blue, and Soft Mint Green (No Purples/Darks) */
        background: linear-gradient(135deg, #e0f7fa, #e1f5fe, #e8f5e9, #b2ebf2);
        background-size: 400% 400%;
        animation: gradientShift 14s ease infinite;
        color: var(--text-color);
        overflow-x: hidden;
      }

      @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Interactive Fluid Ambient Layer */
      #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
        opacity: 0.85;
      }

      /* Main Content Container */
      .container {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 30px 20px;
        box-sizing: border-box;
      }

      /* Ultra-refined Light Glassmorphism Profile Card */
      .profile-card {
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--card-border);
        padding: 25px 20px;
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(31, 45, 61, 0.08);
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 340px;
        transform: translateY(20px);
        opacity: 0;
        animation: cardSpawn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .image-container {
        margin-bottom: 15px;
        overflow: hidden;
        border-radius: 50%;
        width: 100px;
        height: 100px;
        border: 3px solid #ffffff;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
        background-color: #e0f2f1;
      }

      .image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        /* Applied requested profile photo zoom scaling factor */
        transform: scale(1.1);
        transition: transform 0.3s cubic-bezier(0.15, 1, 0.3, 1);
      }

      .image-container img:hover {
        transform: scale(1.18);
      }

      .header-text {
        text-align: center;
        margin-bottom: 20px;
      }

      .header-text p {
        margin: 2px 0;
        font-size: 0.95em;
        color: #5c6b73;
        font-weight: 500;
      }

      .header-text .title-name {
        font-size: 1.35em;
        font-weight: 700;
        color: #1a2a3a;
        display: block;
        margin-top: 3px;
        letter-spacing: -0.3px;
      }

      .links-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        gap: 9px;
      }

      /* Compact and smaller Link Buttons */
      .link {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 11px 16px;
        font-size: 14px;
        font-weight: 600;
        color: #2c3e50;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 12px;
        transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-sizing: border-box;
      }

      .link i {
        margin-right: 12px;
        font-size: 15px;
        width: 20px;
        text-align: center;
        color: #0288d1;
      }

      .link:hover {
        background: rgba(255, 255, 255, 0.75);
        border-color: #00b0ff;
        transform: translateY(-1.5px);
        color: #0288d1;
        box-shadow: 0 6px 14px rgba(0, 176, 255, 0.15);
      }

      @keyframes cardSpawn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 480px) {
        .profile-card {
          max-width: 300px;
          padding: 20px 15px;
        }
        .link {
          font-size: 13.5px;
          padding: 10px 14px;
        }
      }
    </style>
  </head>
  <body>

    <!-- Canvas generating interactive light fluid distortions -->
    <canvas id="bg-canvas"></canvas>

    <div class="container">
      <div class="profile-card">
        <div class="image-container">
          <!-- Portfolio Image Path with direct zoom styling and initial fallback rendering -->

            alt="Raj Anand Soni"
            onerror="if (this.src != 'https://api.dicebear.com/7.x/initials/svg?seed=Raj&backgroundColor=00b0ff') this.src='https://api.dicebear.com/7.x/initials/svg?seed=Raj&backgroundColor=00b0ff';"
          />
        </div>

        <div class="header-text">
          <p>Welcome to</p>
          <span class="title-name">Raj Anand Soni's Space</span>
        </div>

        <div class="links-container">
          <a href="https://raj-soni-portfolio-site.netlify.app" class="link" target="_blank">
            <i class="fas fa-briefcase" style="color: #0288d1;"></i> My Portfolio
          </a>
          <a href="https://rajsoni06.github.io/My_Projects/My_Projects.html" class="link" target="_blank">

    <script>
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');

      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;

      let mouse = { x: width / 2, y: height / 2 };
      
      window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      class FluidBlob {
        constructor(color, radiusModifier) {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.vx = (Math.random() - 0.5) * 0.9;
          this.vy = (Math.random() - 0.5) * 0.9;
          this.baseRadius = (Math.random() * 140 + 160) * radiusModifier;
          this.radius = this.baseRadius;
          this.color = color;
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;

          if (this.x < 0 || this.x > width) this.vx *= -1;
          if (this.y < 0 || this.y > height) this.vy *= -1;

          let dx = mouse.x - this.x;
          let dy = mouse.y - this.y;
          let distance = Math.sqrt(dx * dx + dy * dy);
          
          if (distance < 300) {
            this.radius = this.baseRadius + (300 - distance) * 0.2;
          } else {
            this.radius = this.radius + (this.baseRadius - this.radius) * 0.05;
          }
        }

        draw() {
          let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
          gradient.addColorStop(0, this.color);
          gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = gradient;
          ctx.fill();
        }
      }

      // Replaced old purple/magenta orbs with vibrant Cyan, Deep Sky Blue, and fresh Mint Green
      const blobs = [
        new FluidBlob('rgba(0, 229, 255, 0.45)', 1),   // Bright Cyan Orb
        new FluidBlob('rgba(41, 121, 255, 0.35)', 1.3), // Sky Blue Orb
        new FluidBlob('rgba(105, 240, 174, 0.4)', 1.1)  // Mint Green Orb
      ];

      function renderLoop() {
        ctx.clearRect(0, 0, width, height);

        blobs.forEach(blob => {
          blob.update();
          blob.draw();
        });

        requestAnimationFrame(renderLoop);
      }

      renderLoop();
    </script>
  </body>
</html>
