<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <title>Links Website</title>
    <style>
      :root {
        --primary-glow: rgba(156, 39, 176, 0.4);
        --card-bg: rgba(255, 255, 255, 0.08);
        --card-border: rgba(255, 255, 255, 0.15);
      }

      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
        font-family: 'Segoe UI', Arial, sans-serif;
        background-color: #0a0a16;
        color: white;
        overflow-x: hidden;
      }

      /* 3D Canvas Background fixed to rear */
      #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      /* Main Content Container above canvas */
      .container {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 20px;
        box-sizing: border-box;
      }

      /* Glassmorphism Profile Card */
      .profile-card {
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--card-border);
        padding: 35px 25px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        max-width: 400px;
        transform: translateY(30px);
        opacity: 0;
        animation: cardSpawn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .image-container {
        margin-bottom: 20px;
        position: relative;
      }

      /* Fixed Google Drive Image URL formatting */
      .image-container img {
        border-radius: 50%;
        border: 4px solid #9c27b0;
        width: 130px;
        height: 130px;
        object-fit: cover;
        box-shadow: 0 0 25px var(--primary-glow);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
      }

      .image-container img:hover {
        transform: scale(1.08) rotate(3deg);
        box-shadow: 0 0 35px rgba(156, 39, 176, 0.7);
      }

      .header-text {
        text-align: center;
        margin-bottom: 25px;
      }

      .header-text p {
        margin: 5px 0;
        font-size: 1.15em;
        color: #e0e0e6;
        letter-spacing: 0.5px;
      }

      .header-text .title-name {
        font-size: 1.6em;
        font-weight: 700;
        background: linear-gradient(135deg, #e040fb, #00e5ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: block;
        margin-top: 5px;
      }

      .links-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        gap: 14px;
      }

      /* Sleek link design with minor 3D tilt simulation on hover */
      .link {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        padding: 14px 20px;
        font-size: 16px;
        font-weight: 500;
        color: white;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        box-sizing: border-box;
      }

      .link i {
        margin-right: 15px;
        font-size: 18px;
        width: 24px;
        text-align: center;
        transition: transform 0.3s ease;
      }

      .link:hover {
        background: linear-gradient(135deg, rgba(156, 39, 176, 0.3), rgba(0, 229, 255, 0.2));
        border-color: rgba(0, 229, 255, 0.4);
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), 0 0 15px rgba(0, 229, 255, 0.1);
      }

      .link:hover i {
        transform: scale(1.2);
      }

      @keyframes cardSpawn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 480px) {
        .profile-card {
          padding: 25px 15px;
        }
        .link {
          font-size: 15px;
          padding: 12px 16px;
        }
      }
    </style>

    <!-- Background script generating an interactive 3D particle landscape -->
    <script>
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');

      let width = canvas.width = window.innerWidth;
      let height = canvas.height = window.innerHeight;

      const numParticles = 120;
      const particles = [];
      
      let mouse = { x: width / 2, y: height / 2, targetX: width / 2, targetY: height / 2 };

      window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      });

      window.addEventListener('mousemove', (e) => {
        mouse.targetX = e.clientX;
        mouse.targetY = e.clientY;
      });

      class Particle {
        constructor() {
          this.reset();
          this.y = Math.random() * height; 
        }

        reset() {
          this.x = Math.random() * width;
          this.y = -20;
          this.z = Math.random() * 3 + 0.5; // Z value simulates layer depth
          this.speed = (Math.random() * 0.5 + 0.2) * this.z;
          this.radius = Math.random() * 1.5 + 0.5 * this.z;
          this.color = Math.random() > 0.5 ? 'rgba(156, 39, 176, ' + (0.1 * this.z) + ')' : 'rgba(0, 229, 255, ' + (0.1 * this.z) + ')';
        }

        update() {
          this.y += this.speed;
          
          // Parallax calculation shifts background dots slower than foreground elements
          const driftX = (mouse.x - width / 2) * (this.z * 0.015);
          this.renderX = this.x - driftX;
          this.renderY = this.y;

          if (this.y > height + 20 || this.renderX < -20 || this.renderX > width + 20) {
            this.reset();
          }
        }

        draw() {
          ctx.beginPath();
          ctx.arc(this.renderX, this.renderY, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.shadowBlur = this.z * 2;
          ctx.shadowColor = this.color;
          ctx.fill();
        }
      }

      for (let i = 0; i < numParticles; i++) {
        particles.push(new Particle());
      }

      function animate() {
        // Easing calculations soften sharp cursor changes
        mouse.x += (mouse.targetX - mouse.x) * 0.08;
        mouse.y += (mouse.targetY - mouse.y) * 0.08;

        ctx.fillStyle = 'rgba(10, 10, 22, 0.2)'; 
        ctx.fillRect(0, 0, width, height);
        
        ctx.shadowBlur = 0; // Reset canvas shadows between drawing steps

        particles.forEach(p => {
          p.update();
          p.draw();
        });

        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
